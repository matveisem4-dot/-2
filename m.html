<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pulse | Black Box</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg: #080808; --card: #111111; --accent: #eb0000; /* Глубокий красный для акцентов */
            --border: #222222; --text: #e0e0e0; --muted: #444444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Auth Screen - Полная изоляция */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 100%; max-width: 300px; padding: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); }
        
        .input { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 4px; width: 100%; margin-bottom: 12px; font-size: 14px; transition: 0.3s; }
        .input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(235, 0, 0, 0.2); }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 4px; font-weight: 600; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { opacity: 0.8; }

        /* Main Interface */
        .sidebar { width: 280px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; }

        .chat-header { padding: 15px 25px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; }
        .msg-container { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        .message { max-width: 70%; padding: 10px 14px; border-radius: 4px; font-size: 14px; position: relative; }
        .message.in { background: #1a1a1a; align-self: flex-start; border-left: 2px solid var(--muted); }
        .message.out { background: #222222; align-self: flex-end; border-right: 2px solid var(--accent); }
        .msg-info { font-size: 9px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }

        .contact-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .contact-item:hover { background: #1a1a1a; }
        .contact-item.active { background: #1a1a1a; border-left: 3px solid var(--accent); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; background: var(--muted); }
        .online { background: #00ff00; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-container">
            <h2 style="text-align:center; margin-bottom: 25px; letter-spacing: 2px; font-weight: 300;">AURA PULSE</h2>
            <input type="text" id="auth-id" class="input" placeholder="ACCESS ID">
            <input type="password" id="auth-pass" class="input" placeholder="ENCRYPTION KEY">
            <button class="btn" onclick="Vault.unlock()">UNLOCK DATA</button>
            <p id="auth-err" style="color: var(--accent); font-size: 11px; margin-top: 10px; text-align: center; display: none;">INVALID KEY</p>
        </div>
    </div>

    <div class="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <div style="font-size: 10px; color: var(--muted); margin-bottom: 5px;">SYSTEM NODE</div>
            <div id="my-node-id" style="font-weight: bold; font-size: 14px;">OFFLINE</div>
        </div>
        <div id="contact-list" style="flex: 1; overflow-y: auto;"></div>
        <div style="padding: 15px;">
            <input type="text" id="target-id" class="input" placeholder="CONNECT TO..." style="margin-bottom: 8px;">
            <button class="btn" style="background: transparent; border: 1px solid var(--border);" onclick="App.addContact()">ADD PEER</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <div id="chat-title" style="font-size: 13px; letter-spacing: 1px;">IDLE</div>
            <div id="session-status" style="font-size: 10px; color: var(--muted);">WAITING FOR SELECTION</div>
        </div>
        <div id="chat-messages" class="msg-container"></div>
        <div style="padding: 20px; background: var(--card); display: flex; gap: 10px;">
            <input type="text" id="msg-input" class="input" style="margin:0" placeholder="ENCRYPTED MESSAGE..." onkeypress="if(event.key==='Enter') App.send()">
            <button class="btn" style="width: 100px;" onclick="App.send()">SEND</button>
        </div>
    </div>

    <script>
        const Vault = {
            key: '', id: '',
            // Шифруем данные перед сохранением
            encrypt(data) {
                return CryptoJS.AES.encrypt(JSON.stringify(data), this.key).toString();
            },
            // Расшифровываем при загрузке
            decrypt(cipherText) {
                try {
                    const bytes = CryptoJS.AES.decrypt(cipherText, this.key);
                    return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                } catch (e) { return null; }
            },
            unlock() {
                const id = document.getElementById('auth-id').value.toUpperCase().trim();
                const pass = document.getElementById('auth-pass').value.trim();
                if(!id || !pass) return;

                this.id = id;
                this.key = pass;

                const savedData = localStorage.getItem('ap_vault_' + id);
                if (savedData) {
                    const decrypted = this.decrypt(savedData);
                    if (!decrypted) {
                        document.getElementById('auth-err').style.display = 'block';
                        return;
                    }
                    App.data = decrypted;
                } else {
                    // Новый пользователь - создаем пустую базу
                    App.data = { contacts: {}, history: {} };
                    this.save();
                }

                document.getElementById('auth-screen').classList.add('hidden');
                App.init();
            },
            save() {
                const cipher = this.encrypt(App.data);
                localStorage.setItem('ap_vault_' + this.id, cipher);
            }
        };

        const App = {
            data: {}, peer: null, activeChat: null,
            init() {
                document.getElementById('my-node-id').innerText = Vault.id;
                this.peer = new Peer('AP-NODE-' + Vault.id);
                
                this.peer.on('open', () => console.log('Network Live'));
                this.peer.on('connection', conn => {
                    conn.on('data', d => this.handleIncoming(d));
                });

                this.renderContacts();
            },

            addContact() {
                const tid = document.getElementById('target-id').value.toUpperCase().trim();
                if(!tid || tid === Vault.id) return;
                if(!this.data.contacts[tid]) {
                    this.data.contacts[tid] = { name: tid, added: Date.now() };
                    this.data.history[tid] = [];
                    Vault.save();
                    this.renderContacts();
                }
            },

            renderContacts() {
                const list = document.getElementById('contact-list');
                list.innerHTML = '';
                Object.keys(this.data.contacts).forEach(id => {
                    const div = document.createElement('div');
                    div.className = `contact-item ${this.activeChat === id ? 'active' : ''}`;
                    div.innerHTML = `<div style="font-size:14px">${id}</div><div style="font-size:10px; color:var(--muted)">SECURE CHANNEL</div>`;
                    div.onclick = () => this.openChat(id);
                    list.appendChild(div);
                });
            },

            openChat(id) {
                this.activeChat = id;
                document.getElementById('chat-title').innerText = 'CHANNEL: ' + id;
                document.getElementById('session-status').innerText = 'ENCRYPTED P2P SESSION';
                this.renderMessages();
                this.renderContacts();
            },

            send() {
                const text = document.getElementById('msg-input').value;
                if(!text || !this.activeChat) return;

                const conn = this.peer.connect('AP-NODE-' + this.activeChat);
                conn.on('open', () => {
                    conn.send({ from: Vault.id, body: text });
                    this.data.history[this.activeChat].push({ from: 'me', text: text, time: Date.now() });
                    Vault.save();
                    this.renderMessages();
                    document.getElementById('msg-input').value = '';
                });
            },

            handleIncoming(data) {
                const from = data.from;
                if(!this.data.history[from]) this.data.history[from] = [];
                this.data.history[from].push({ from: from, text: data.body, time: Date.now() });
                Vault.save();
                if(this.activeChat === from) this.renderMessages();
            },

            renderMessages() {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                const history = this.data.history[this.activeChat] || [];
                history.forEach(m => {
                    const div = document.createElement('div');
                    div.className = `message ${m.from === 'me' ? 'out' : 'in'}`;
                    div.innerHTML = `<div class="msg-info">${m.from === 'me' ? Vault.id : m.from}</div><div>${m.text}</div>`;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            }
        };
    </script>
</body>
</html>
