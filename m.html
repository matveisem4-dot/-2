<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aura Pulse</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --panel: #0f1218; --accent: #00f2ff;
            --text: #e2e8f0; --muted: #64748b; --success: #22c55e;
            --danger: #ef4444; --gold: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* Auth Screen */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Main Layout */
        .app-shell { display: grid; grid-template-columns: 320px 1fr 280px; width: 100vw; height: 100dvh; opacity: 0; transition: opacity 0.5s; }
        .sidebar { background: var(--panel); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .chat-main { display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .right-bar { background: var(--panel); border-left: 1px solid rgba(255,255,255,0.05); padding: 20px; }

        /* UI Elements */
        .btn { background: var(--accent); color: black; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,242,255,0.3); }
        .input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 12px; margin-bottom: 15px; width: 100%; font-size: 16px; }
        
        /* Messages */
        .messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px 18px; border-radius: 18px; line-height: 1.5; font-size: 15px; position: relative; }
        .bubble.in { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; }
        .bubble.out { background: linear-gradient(135deg, #0088cc, #005588); align-self: flex-end; border-bottom-right-radius: 4px; }
        .sys-msg { align-self: center; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 10px 0; }

        /* Global Feed / Economy */
        .gold-card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border: 1px solid var(--gold); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .balance { font-size: 28px; font-weight: 800; color: var(--gold); margin: 5px 0; }
        
        .contact-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; align-items: center; gap: 12px; }
        .contact-item:hover { background: rgba(255,255,255,0.03); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        @media (max-width: 900px) { .right-bar { display: none; } .app-shell { grid-template-columns: 80px 1fr; } .sidebar span { display: none; } }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h1 style="font-size: 32px; letter-spacing: -1px; margin-bottom: 10px;">AURA PULSE</h1>
            <p style="color: var(--muted); margin-bottom: 30px;">Твоя личная сеть. Твои правила.</p>
            <input type="text" id="user-id" class="input" placeholder="Создай свой ID">
            <input type="password" id="user-pw" class="input" placeholder="Придумай пароль">
            <button class="btn" style="width: 100%;" onclick="Core.init()">ВОЙТИ В СЕТЬ</button>
        </div>
    </div>

    <div id="main-app" class="app-shell">
        <div class="sidebar">
            <div style="padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05);">
                <h3 id="my-name-display">ID</h3>
            </div>
            <div style="flex: 1; overflow-y: auto;" id="contacts-list">
                <div class="contact-item" onclick="Core.switchChat('GLOBAL')">
                    <div class="avatar" style="background: var(--gold);">★</div>
                    <span>Global Hub</span>
                </div>
            </div>
            <div style="padding: 20px;">
                <input id="add-id" class="input" placeholder="Добавить ID..." style="margin-bottom: 8px;">
                <button class="btn" style="width: 100%; background: transparent; border: 1px solid var(--accent); color: var(--accent);" onclick="Core.addContact()">+ НАЧАТЬ ЧАТ</button>
            </div>
        </div>

        <div class="chat-main">
            <div style="padding: 15px 25px; background: var(--panel); display: flex; justify-content: space-between; align-items: center;">
                <h2 id="active-chat-name">Global Hub</h2>
                <div style="display:flex; gap: 10px;">
                    <button class="btn" style="padding: 8px 15px; font-size: 12px;" onclick="Media.startVideo()">ВИДЕОСВЯЗЬ</button>
                </div>
            </div>
            <div class="messages" id="chat-box"></div>
            <div style="padding: 20px; background: var(--panel); display: flex; gap: 15px;">
                <input id="msg-input" class="input" style="margin-bottom: 0;" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter') Core.send()">
                <button class="btn" onclick="Core.send()">ОТПРАВИТЬ</button>
            </div>
        </div>

        <div class="right-bar">
            <div class="gold-card">
                <div style="font-size: 11px; opacity: 0.6; text-transform: uppercase;">Личный капитал</div>
                <div class="balance" id="bal-val">0.00</div>
                <div style="font-size: 12px; color: var(--gold);">Aura Credits</div>
            </div>
            <button class="mining-btn btn" style="width: 100%; background: #22c55e; color: white;" onclick="Economy.earn()">ПОЛУЧИТЬ КРЕДИТЫ</button>
            
            <div style="margin-top: 30px;">
                <h4 style="margin-bottom: 10px;">Статус сети</h4>
                <div style="font-size: 13px; color: var(--success);">● Все системы онлайн</div>
                <div style="font-size: 12px; color: var(--muted); margin-top: 5px;">Шифрование: P2P End-to-End</div>
            </div>
        </div>
    </div>

    <script>
        // Core Logic
        const Core = {
            peer: null, myID: '', activeChat: 'GLOBAL',
            db: JSON.parse(localStorage.getItem('aura_storage')) || { balance: 0, contacts: [] },

            init() {
                const id = document.getElementById('user-id').value.toUpperCase().trim();
                if(!id) return alert("Введите ID");
                this.myID = id;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.opacity = '1';
                document.getElementById('my-name-display').innerText = id;
                
                this.peer = new Peer('AURA-PRO-' + id);
                this.peer.on('open', () => this.listen());
                this.updateUI();
            },

            listen() {
                this.peer.on('connection', conn => {
                    conn.on('data', data => {
                        this.receive(data);
                    });
                });
            },

            addContact() {
                const target = document.getElementById('add-id').value.toUpperCase().trim();
                if(!target || target === this.myID) return;
                if(!this.db.contacts.includes(target)) this.db.contacts.push(target);
                this.save();
                this.switchChat(target);
                this.updateUI();
            },

            switchChat(id) {
                this.activeChat = id;
                document.getElementById('active-chat-name').innerText = id;
                document.getElementById('chat-box').innerHTML = `<div class="sys-msg">Канал ${id} защищен</div>`;
            },

            send() {
                const val = document.getElementById('msg-input').value;
                if(!val || this.activeChat === 'GLOBAL') return; // Глобал через сервер, P2P только лично

                const conn = this.peer.connect('AURA-PRO-' + this.activeChat);
                conn.on('open', () => {
                    conn.send({ type: 'TEXT', from: this.myID, body: val });
                    this.addBubble(this.myID, val, 'out');
                    document.getElementById('msg-input').value = '';
                });
            },

            receive(data) {
                if(data.type === 'TEXT') {
                    if(this.activeChat === data.from) {
                        this.addBubble(data.from, data.body, 'in');
                    } else {
                        // Оповещение о новом контакте, если его нет
                        if(!this.db.contacts.includes(data.from)) {
                            this.db.contacts.push(data.from);
                            this.save();
                            this.updateUI();
                        }
                    }
                }
            },

            addBubble(user, text, style) {
                const box = document.getElementById('chat-box');
                const div = document.createElement('div');
                div.className = `bubble ${style}`;
                div.innerHTML = `<small style="opacity:0.5; font-size:10px;">${user}</small><br>${text}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            },

            updateUI() {
                const list = document.getElementById('contacts-list');
                const existingGlobal = list.firstElementChild;
                list.innerHTML = '';
                list.appendChild(existingGlobal);

                this.db.contacts.forEach(c => {
                    const item = document.createElement('div');
                    item.className = 'contact-item';
                    item.innerHTML = `<div class="avatar">${c[0]}</div><span>${c}</span>`;
                    item.onclick = () => this.switchChat(c);
                    list.appendChild(item);
                });
                document.getElementById('bal-val').innerText = this.db.balance.toFixed(2);
            },

            save() { localStorage.setItem('aura_storage', JSON.stringify(this.db)); }
        };

        // Economy
        const Economy = {
            earn() {
                Core.db.balance += 0.50;
                Core.save();
                Core.updateUI();
            }
        };

        // Placeholder for Media
        const Media = {
            startVideo() { alert("Инициализация P2P видео-потока..."); }
        };
    </script>
</body>
</html>
