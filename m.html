<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Pulse</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #000000; --panel: #0a0a0a; --accent: #ffffff;
            --border: #1a1a1a; --text: #ffffff; --muted: #555555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Auth Screen */
        .auth { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { width: 100%; max-width: 320px; text-align: center; }
        
        /* Layout */
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; background: var(--bg); }

        /* Elements */
        .input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 4px; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .input:focus { border-color: var(--accent); outline: none; }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: 600; cursor: pointer; width: 100%; font-size: 14px; }
        .btn-text { background: none; color: var(--muted); border: none; cursor: pointer; font-size: 12px; text-decoration: underline; }

        /* Chat */
        .chat-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; font-size: 14px; line-height: 1.6; }
        .msg.in { align-self: flex-start; color: #ccc; }
        .msg.out { align-self: flex-end; color: var(--accent); text-align: right; }
        .msg-meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }

        .input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        
        .contact { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; }
        .contact:hover { background: #0f0f0f; }
        .contact.active { background: #151515; border-left: 2px solid var(--accent); }
        .contact-id { font-size: 14px; font-weight: 500; }
        .contact-last { font-size: 11px; color: var(--muted); margin-top: 4px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth">
        <div class="auth-box">
            <h2 style="letter-spacing: 4px; margin-bottom: 30px; font-weight: 300;">AURA PULSE</h2>
            <input type="text" id="u-id" class="input" placeholder="ID">
            <input type="password" id="u-pw" class="input" placeholder="PASSWORD">
            <button class="btn" onclick="Core.connect()">INITIALIZE</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
            <div id="my-id-label" style="font-size: 12px; letter-spacing: 2px; color: var(--muted);">OFFLINE</div>
        </div>
        <div id="contacts" style="flex: 1; overflow-y: auto;"></div>
        <div style="padding: 20px;">
            <input type="text" id="new-id" class="input" placeholder="CONNECT TO ID..." style="margin-bottom: 5px;">
            <button class="btn" style="background: none; color: #fff; border: 1px solid var(--border);" onclick="Core.add()">+</button>
        </div>
    </div>

    <div class="viewport">
        <div id="chat-head" class="chat-header">
            <span id="active-id" style="letter-spacing: 1px; font-size: 14px; color: var(--muted);">SELECT SESSION</span>
            <div id="call-tools" class="hidden">
                <button class="btn-text" onclick="Core.startCall()">[ VIDEO CALL ]</button>
            </div>
        </div>
        <div id="msg-box" class="messages"></div>
        <div class="input-area">
            <input type="text" id="m-input" class="input" placeholder="MESSAGE..." style="margin-bottom: 0;" onkeypress="if(event.key==='Enter') Core.send()">
            <button class="btn" style="width: auto; padding: 0 25px;" onclick="Core.send()">SEND</button>
        </div>
    </div>

    <script>
        const Core = {
            peer: null, myID: '', activeChat: null,
            db: JSON.parse(localStorage.getItem('ap_db')) || { contacts: [] },

            connect() {
                const id = document.getElementById('u-id').value.toUpperCase().trim();
                if(!id) return;
                this.myID = id;
                this.peer = new Peer('AP-' + id);
                this.peer.on('open', () => {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('my-id-label').innerText = 'NODE: ' + id;
                    this.renderContacts();
                });
                this.peer.on('connection', c => {
                    c.on('data', d => this.handleData(d));
                });
                this.peer.on('call', call => {
                    if(confirm("INCOMING CALL FROM " + call.peer)) {
                        navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
                            call.answer(s);
                            this.showVideo(call);
                        });
                    }
                });
            },

            add() {
                const id = document.getElementById('new-id').value.toUpperCase().trim();
                if(!id || id === this.myID) return;
                if(!this.db.contacts.includes(id)) this.db.contacts.push(id);
                this.save(); this.renderContacts(); this.open(id);
            },

            open(id) {
                this.activeChat = id;
                document.getElementById('active-id').innerText = 'SESSION: ' + id;
                document.getElementById('msg-box').innerHTML = '';
                document.querySelectorAll('.contact').forEach(el => el.classList.remove('active'));
                this.renderContacts();
            },

            send() {
                const val = document.getElementById('m-input').value;
                if(!val || !this.activeChat) return;
                const conn = this.peer.connect('AP-' + this.activeChat);
                conn.on('open', () => {
                    conn.send({ from: this.myID, text: val });
                    this.append(this.myID, val, 'out');
                    document.getElementById('m-input').value = '';
                });
            },

            handleData(d) {
                if(this.activeChat === d.from) {
                    this.append(d.from, d.text, 'in');
                } else {
                    if(!this.db.contacts.includes(d.from)) {
                        this.db.contacts.push(d.from);
                        this.save(); this.renderContacts();
                    }
                }
            },

            append(id, txt, side) {
                const b = document.getElementById('msg-box');
                const div = document.createElement('div');
                div.className = `msg ${side}`;
                div.innerHTML = `<div class="msg-meta">${id}</div><div>${txt}</div>`;
                b.appendChild(div);
                b.scrollTop = b.scrollHeight;
            },

            renderContacts() {
                const c = document.getElementById('contacts');
                c.innerHTML = '';
                this.db.contacts.forEach(id => {
                    const div = document.createElement('div');
                    div.className = `contact ${this.activeChat === id ? 'active' : ''}`;
                    div.innerHTML = `<div class="contact-id">${id}</div><div class="contact-last">SECURE P2P</div>`;
                    div.onclick = () => this.open(id);
                    c.appendChild(div);
                });
            },

            save() { localStorage.setItem('ap_db', JSON.stringify(this.db)); },
            
            startCall() {
                navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
                    const call = this.peer.call('AP-' + this.activeChat, s);
                    this.showVideo(call);
                });
            },

            showVideo(call) {
                const v = document.createElement('video');
                v.style = "position:fixed; top:20px; right:20px; width:300px; border:1px solid #fff; z-index:2000;";
                v.autoplay = true;
                document.body.appendChild(v);
                call.on('stream', s => v.srcObject = s);
            }
        };
    </script>
</body>
</html>
