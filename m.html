<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0e1621">
    <title>Aura Pulse v18</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* =========================================================
           AURA PULSE v18 - CORE DESIGN SYSTEM
           ========================================================= */
        :root {
            --bg-base: #0e1621; --bg-panel: #17212b; --bg-hover: #202b36; --bg-active: #2b5278;
            --primary: #2b5278; --primary-light: #3e73a5; --accent: #00f2ff;
            --text-main: #ffffff; --text-muted: #7f91a4; --text-danger: #ff595a; --text-success: #4cd964;
            --msg-in: #182533; --msg-out: #2b5278; --msg-sys: #202b36;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px; --radius-round: 50%;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body, html { height: 100dvh; width: 100vw; background-color: var(--bg-base); color: var(--text-main); overflow: hidden; position: relative; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #3a4b5c; border-radius: 10px; }
        
        h1, h2 { font-weight: 600; margin-bottom: 10px; }
        p { margin-bottom: 15px; line-height: 1.5; }
        .hidden { display: none !important; }
        .flex { display: flex; } .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; } .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; } .w-full { width: 100%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .anim-fade-in { animation: fadeIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* Buttons & Inputs */
        .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: var(--radius-md); font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.97); }
        .btn-danger { background: var(--text-danger); } .btn-success { background: var(--text-success); }
        .btn-outline { background: transparent; border: 1px solid var(--text-muted); }
        .btn-icon { background: transparent; padding: 8px; border-radius: var(--radius-round); cursor: pointer; color: var(--text-muted); border: none; display: flex; align-items: center; justify-content: center; }
        .btn-icon svg { width: 24px; height: 24px; fill: currentColor; }
        .input { width: 100%; background: var(--bg-base); border: 1px solid #2f3942; color: white; padding: 14px 16px; border-radius: var(--radius-md); font-size: 16px; margin-bottom: 10px; }
        .avatar { width: 48px; height: 48px; border-radius: var(--radius-round); background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: white; object-fit: cover; flex-shrink: 0; }

        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(14, 22, 33, 0.95); backdrop-filter: blur(5px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: var(--bg-panel); width: 100%; max-width: 380px; padding: 30px; border-radius: var(--radius-lg); text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto;}
        .alert-text { color: var(--text-danger); font-size: 14px; min-height: 20px; margin-top: 10px; }

        /* Call Screen */
        #call-screen { background: radial-gradient(circle at center, #1e293b, #0e1621); z-index: 10000; }
        .call-av { width: 120px; height: 120px; font-size: 50px; margin: 0 auto 30px; box-shadow: 0 0 30px rgba(43, 82, 120, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(76, 217, 100, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 217, 100, 0); } }
        .call-controls { display: flex; gap: 40px; justify-content: center; margin-top: 50px; }
        .call-btn { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; transition: 0.2s; }
        .call-btn:active { transform: scale(0.9); } .call-btn svg { width: 32px; height: 32px; fill: white; }

        /* Layout */
        .app-layout { display: flex; height: 100dvh; width: 100vw; }
        .sidebar { width: 340px; background: var(--bg-panel); border-right: 1px solid rgba(0,0,0,0.3); display: flex; flex-direction: column; z-index: 100; transition: transform 0.3s; }
        .sidebar-header { padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .chat-item:hover { background: var(--bg-hover); } .chat-item.active { background: var(--bg-active); }
        .chat-info { flex: 1; overflow: hidden; text-align: left; }
        .chat-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .chat-preview { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-base); position: relative; }
        .chat-header { padding: 10px 15px; background: var(--bg-panel); display: flex; align-items: center; justify-content: space-between; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; }
        .msg-bubble.in { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg-bubble.out { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 4px; }
        .msg-bubble.sys { align-self: center; background: var(--msg-sys); color: var(--text-muted); font-size: 12px; border-radius: 10px; text-align: center; }
        
        /* File Attachment Styling */
        .file-attachment { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .file-attachment:hover { background: rgba(0,0,0,0.3); }
        .file-icon { background: var(--primary-light); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .input-area { padding: 10px 15px calc(10px + var(--safe-bottom)); background: var(--bg-panel); display: flex; align-items: center; gap: 10px; z-index: 20; }
        .chat-input { flex: 1; background: var(--bg-base); border: none; color: white; padding: 12px 16px; border-radius: 20px; font-size: 16px; }

        /* Settings Rows */
        .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; }
        
        /* Mobile */
        .mobile-back { display: none; }
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100dvh; width: 100%; transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .mobile-back { display: block; margin-right: 15px; color: white; }
        }
    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-send" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></symbol>
        <symbol id="icon-call" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></symbol>
        <symbol id="icon-end" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></symbol>
        <symbol id="icon-back" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></symbol>
        <symbol id="icon-settings" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></symbol>
        <symbol id="icon-attach" viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-1.38-1.12-2.5-2.5-2.5S8 3.62 8 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></symbol>
    </svg>

    <div id="screen-auth" class="overlay hidden">
        <div class="modal-card anim-fade-in">
            <h2>Aura Pulse v18</h2>
            <p class="text-muted" style="font-size:14px;">Создайте или введите свой ID</p>
            <input type="text" id="auth-id" class="input" placeholder="Ваш уникальный ID">
            <button class="btn w-full" style="margin-top:10px;" onclick="AppLogic.login()">ВОЙТИ / СОЗДАТЬ</button>
            <div id="auth-error" class="alert-text"></div>
        </div>
    </div>

    <div id="modal-settings" class="overlay hidden">
        <div class="modal-card anim-fade-in" style="max-width:400px;">
            <div class="flex justify-between items-center" style="margin-bottom: 20px;">
                <h2>Настройки</h2>
                <button class="btn-icon" onclick="UI.hideModal('modal-settings')"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="white"/></svg></button>
            </div>
            
            <div class="settings-row">
                <div>
                    <b>Автоответчик</b>
                    <div style="font-size:12px; color:var(--text-muted)">Отвечать файлом при звонке</div>
                </div>
                <button id="btn-toggle-voicemail" class="btn btn-outline" style="padding: 8px 12px; font-size: 12px;" onclick="Voicemail.toggle()">ВЫКЛ</button>
            </div>
            
            <div id="voicemail-upload-box" class="settings-row hidden flex-col items-start gap-2">
                <div style="font-size:13px; color:var(--text-muted);">Загрузите аудио (до 5МБ)</div>
                <input type="file" id="voicemail-file" accept="audio/*" class="hidden" onchange="Voicemail.handleUpload(event)">
                <button class="btn btn-outline w-full" onclick="document.getElementById('voicemail-file').click()">Выбрать аудиофайл</button>
                <audio id="voicemail-preview" controls style="width:100%; height: 30px; margin-top:5px; display:none;"></audio>
            </div>

            <div class="settings-row" style="margin-top:20px; border:none;">
                <button class="btn btn-danger w-full" onclick="AppLogic.hardReset()">УДАЛИТЬ ДАННЫЕ И ВЫЙТИ</button>
            </div>
        </div>
    </div>

    <div id="call-screen" class="overlay hidden">
        <div class="flex-col items-center justify-center w-full">
            <div id="call-status" style="color:var(--text-muted); margin-bottom: 15px; font-size: 18px; text-transform: uppercase; letter-spacing: 2px;">Входящий вызов</div>
            <div class="avatar call-av" id="call-av-letter">?</div>
            <h1 id="call-name" style="font-size: 32px; font-weight: 300;">ID</h1>
            
            <div class="call-controls" id="call-incoming-btns">
                <button class="call-btn btn-success" onclick="CallManager.acceptCall()"><svg><use href="#icon-call"></use></svg></button>
                <button class="call-btn btn-danger" onclick="CallManager.rejectCall()"><svg><use href="#icon-end"></use></svg></button>
            </div>
            <div class="call-controls hidden" id="call-active-btns">
                <button class="call-btn btn-danger" onclick="CallManager.endCall()"><svg><use href="#icon-end"></use></svg></button>
            </div>
        </div>
    </div>

    <div class="app-layout" id="app-main" style="display:none;">
        
        <div class="sidebar show" id="sidebar">
            <div class="sidebar-header">
                <div class="flex items-center gap-3">
                    <div class="avatar" id="my-avatar" style="width:36px;height:36px;font-size:14px;"></div>
                    <b>Aura Pulse</b>
                </div>
                <button class="btn-icon" onclick="UI.showModal('modal-settings')"><svg><use href="#icon-settings"></use></svg></button>
            </div>
            <div style="padding: 10px 15px; border-bottom: 1px solid var(--bg-base);">
                <div class="flex gap-2">
                    <input type="text" id="add-id" class="input" style="margin:0; padding:10px; font-size:14px;" placeholder="ID для поиска...">
                    <button class="btn" style="padding:10px;" onclick="AppLogic.addContact()">+</button>
                </div>
            </div>
            <div class="chat-list" id="chat-list"></div>
        </div>

        <div class="chat-area">
            <div id="empty-state" class="flex flex-col items-center justify-center w-full" style="height:100%; color:var(--text-muted);">
                Выберите чат для общения
            </div>

            <div id="active-chat-view" class="flex-col w-full hidden" style="height:100%;">
                <div class="chat-header">
                    <div class="flex items-center">
                        <button class="btn-icon mobile-back" onclick="UI.toggleSidebar(true)"><svg><use href="#icon-back"></use></svg></button>
                        <div class="avatar" id="active-av" style="width:40px;height:40px;margin-right:12px;font-size:16px;"></div>
                        <div>
                            <div style="font-weight:600; font-size: 16px;" id="active-name">Имя</div>
                            <div style="font-size:12px; color:var(--text-muted)">P2P Канал защищен</div>
                        </div>
                    </div>
                    <button class="btn-icon" style="color:var(--text-success);" onclick="CallManager.startCall()"><svg><use href="#icon-call"></use></svg></button>
                </div>

                <div class="messages-container" id="messages-box"></div>

                <input type="file" id="infinity-file" class="hidden" onchange="InfinityStream.sendFile(event)">

                <div class="input-area">
                    <button class="btn-icon" onclick="document.getElementById('infinity-file').click()"><svg><use href="#icon-attach"></use></svg></button>
                    <input type="text" id="msg-input" class="chat-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') AppLogic.sendMessage()">
                    <button class="btn-icon" style="color:var(--primary-light);" onclick="AppLogic.sendMessage()"><svg><use href="#icon-send"></use></svg></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // PWA SERVICE WORKER (Background enablement)
        // ==========================================
        // This allows the app to be installed and keeps it alive longer.
        const swCode = `
            self.addEventListener('install', (e) => self.skipWaiting());
            self.addEventListener('activate', (e) => self.clients.claim());
            self.addEventListener('fetch', (e) => {});
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(err => console.log('SW Reg Failed', err));
        }

        // ==========================================
        // STATE & DB
        // ==========================================
        const DB = {
            get: (key) => JSON.parse(localStorage.getItem(key)),
            set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),
            clear: () => localStorage.clear()
        };

        const State = {
            myID: null,
            peer: null,
            activeChat: null,
            chats: DB.get('aura18_chats') || {},
            settings: DB.get('aura18_settings') || { autoResponder: false, voicemailData: null }
        };

        // ==========================================
        // UI ENGINE
        // ==========================================
        const UI = {
            showModal: (id) => { document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); },
            hideModal: (id) => document.getElementById(id).classList.add('hidden'),
            toggleSidebar: (show) => document.getElementById('sidebar').classList.toggle('show', show),
            renderList: () => {
                const box = document.getElementById('chat-list');
                box.innerHTML = '';
                Object.keys(State.chats).forEach(id => {
                    const c = State.chats[id];
                    const lastMsg = c.messages.length ? c.messages[c.messages.length-1].t : "Нет сообщений";
                    const div = document.createElement('div');
                    div.className = `chat-item ${State.activeChat === id ? 'active' : ''}`;
                    div.innerHTML = `<div class="avatar">${id[0]}</div><div class="chat-info"><div class="chat-name">${id}</div><div class="chat-preview">${lastMsg}</div></div>`;
                    div.onclick = () => AppLogic.openChat(id);
                    box.appendChild(div);
                });
            },
            renderMessages: () => {
                const box = document.getElementById('messages-box');
                box.innerHTML = '';
                State.chats[State.activeChat].messages.forEach(m => {
                    const div = document.createElement('div');
                    div.className = `msg-bubble ${m.s}`;
                    if(m.type === 'file') {
                        // Render file attachment block
                        div.innerHTML = `
                            <div style="font-weight:bold; margin-bottom:5px;">Файл получен</div>
                            <a href="${m.url}" download="${m.filename}" class="file-attachment" style="text-decoration:none; color:white;">
                                <div class="file-icon">💾</div>
                                <div>
                                    <div style="font-size:14px;">${m.filename}</div>
                                    <div style="font-size:12px; color:var(--accent);">Скачать</div>
                                </div>
                            </a>
                        `;
                    } else {
                        div.innerText = m.t;
                    }
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            }
        };

        // ==========================================
        // SMART VOICEMAIL ENGINE
        // ==========================================
        const Voicemail = {
            toggle() {
                State.settings.autoResponder = !State.settings.autoResponder;
                DB.set('aura18_settings', State.settings);
                this.updateUI();
            },
            handleUpload(e) {
                const file = e.target.files[0];
                if(!file) return;
                if(file.size > 5 * 1024 * 1024) return alert("Файл слишком большой! Лимит 5МБ.");
                const reader = new FileReader();
                reader.onload = (ev) => {
                    State.settings.voicemailData = ev.target.result;
                    DB.set('aura18_settings', State.settings);
                    this.updateUI();
                    alert("Автоответчик успешно загружен!");
                };
                reader.readAsDataURL(file);
            },
            updateUI() {
                const btn = document.getElementById('btn-toggle-voicemail');
                const box = document.getElementById('voicemail-upload-box');
                if(State.settings.autoResponder) {
                    btn.innerText = "ВКЛ"; btn.classList.add('btn-success'); btn.classList.remove('btn-outline');
                    box.classList.remove('hidden');
                    if(State.settings.voicemailData) {
                        const audio = document.getElementById('voicemail-preview');
                        audio.src = State.settings.voicemailData;
                        audio.style.display = 'block';
                    }
                } else {
                    btn.innerText = "ВЫКЛ"; btn.classList.remove('btn-success'); btn.classList.add('btn-outline');
                    box.classList.add('hidden');
                }
            },
            // Generates MediaStream from saved audio for WebRTC
            getStream() {
                if(!State.settings.voicemailData) return null;
                const audio = new Audio(State.settings.voicemailData);
                audio.loop = true;
                audio.play();
                // captureStream is supported in Chrome/FF. 
                return audio.captureStream ? audio.captureStream() : null;
            }
        };

        // ==========================================
        // AURA INFINITY (P2P File Stream)
        // ==========================================
        const InfinityStream = {
            sendFile(e) {
                const file = e.target.files[0];
                if(!file || !State.activeChat) return;
                
                // Alerting user. For massive files, we rely on PeerJS binary serialization (Blob).
                // Modern browsers support sending Blobs directly over DataChannels up to ~1GB if memory permits.
                const conn = State.peer.connect('AURA-' + State.activeChat);
                conn.on('open', () => {
                    // Send metadata first
                    conn.send({ type: 'FILE_META', filename: file.name, size: file.size, from: State.myID });
                    
                    // Send actual file Blob
                    conn.send({ type: 'FILE_DATA', fileBlob: file, from: State.myID });
                    
                    // Save to local chat
                    State.chats[State.activeChat].messages.push({
                        type: 'file', t: 'Файл отправлен', s: 'out', filename: file.name, url: URL.createObjectURL(file)
                    });
                    DB.set('aura18_chats', State.chats);
                    UI.renderMessages();
                    UI.renderList();
                });
            },
            receiveFile(data) {
                if(!State.chats[data.from]) State.chats[data.from] = {messages:[]};
                
                // Create downloadable link from received Blob
                const blobUrl = URL.createObjectURL(new Blob([data.fileBlob]));
                
                State.chats[data.from].messages.push({
                    type: 'file', t: 'Вам отправили файл', s: 'in', 
                    filename: data.filename || 'P2P_File', url: blobUrl
                });
                
                DB.set('aura18_chats', State.chats);
                UI.renderList();
                if(State.activeChat === data.from) UI.renderMessages();
            }
        };

        // ==========================================
        // CALL MANAGER
        // ==========================================
        const CallManager = {
            currentCall: null, localStream: null, remoteAudio: new Audio(), ringTimer: null,
            
            async startCall() {
                if(!State.activeChat) return;
                try {
                    this.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.currentCall = State.peer.call('AURA-' + State.activeChat, this.localStream);
                    this.showUI(State.activeChat, 'Вызов...', true);
                    
                    this.currentCall.on('stream', (stream) => {
                        this.remoteAudio.srcObject = stream; this.remoteAudio.play();
                        document.getElementById('call-status').innerText = 'На связи';
                    });
                    this.currentCall.on('close', () => this.endCall());
                } catch(e) { alert("Доступ к микрофону запрещен."); }
            },

            handleIncoming(call) {
                this.currentCall = call;
                const caller = call.peer.replace('AURA-', '');
                
                // Smart Voicemail Logic
                if(State.settings.autoResponder && State.settings.voicemailData) {
                    console.log("Auto-responder answering...");
                    // Delay slightly to simulate real answer
                    setTimeout(() => {
                        const vmStream = Voicemail.getStream();
                        if(vmStream) {
                            call.answer(vmStream);
                            // We don't listen to their audio in Voicemail mode for privacy, or we could record it.
                        } else {
                            call.close(); // Fallback if stream fails
                        }
                    }, 2500);
                    return; // Don't show UI
                }

                this.showUI(caller, 'Входящий звонок', false);
                call.on('close', () => this.endCall());
            },

            async acceptCall() {
                try {
                    this.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    this.currentCall.answer(this.localStream);
                    document.getElementById('call-incoming-btns').classList.add('hidden');
                    document.getElementById('call-active-btns').classList.remove('hidden');
                    document.getElementById('call-status').innerText = 'Соединение...';
                    
                    this.currentCall.on('stream', (stream) => {
                        this.remoteAudio.srcObject = stream; this.remoteAudio.play();
                        document.getElementById('call-status').innerText = 'На связи';
                    });
                } catch(e) { this.rejectCall(); }
            },

            rejectCall() { if(this.currentCall) this.currentCall.close(); this.endCall(); },
            endCall() {
                if(this.currentCall) this.currentCall.close();
                if(this.localStream) this.localStream.getTracks().forEach(t => t.stop());
                UI.hideModal('call-screen'); this.currentCall = null;
            },

            showUI(id, status, isCaller) {
                document.getElementById('call-name').innerText = id;
                document.getElementById('call-status').innerText = status;
                document.getElementById('call-av-letter').innerText = id[0];
                UI.showModal('call-screen');
                document.getElementById('call-incoming-btns').classList.toggle('hidden', isCaller);
                document.getElementById('call-active-btns').classList.toggle('hidden', !isCaller);
            }
        };

        // ==========================================
        // APP LOGIC
        // ==========================================
        const AppLogic = {
            init() {
                State.myID = DB.get('aura18_id');
                if(!State.myID) UI.showModal('screen-auth');
                else this.bootNetwork();
                Voicemail.updateUI();
            },

            login() {
                const id = document.getElementById('auth-id').value.trim().toUpperCase();
                if(id.length < 3) return document.getElementById('auth-error').innerText = "Минимум 3 символа";
                DB.set('aura18_id', id);
                State.myID = id;
                this.bootNetwork();
            },

            bootNetwork() {
                document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
                document.getElementById('app-main').style.display = 'flex';
                document.getElementById('my-avatar').innerText = State.myID[0];

                State.peer = new Peer('AURA-' + State.myID, { config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }]} });
                State.peer.on('open', () => UI.renderList());
                
                State.peer.on('connection', conn => {
                    let incomingFilename = "Файл";
                    conn.on('data', data => {
                        // Text messages
                        if(data.type === 'MSG') {
                            if(!State.chats[data.from]) State.chats[data.from] = {messages:[]};
                            State.chats[data.from].messages.push({t: data.text, s: 'in'});
                            DB.set('aura18_chats', State.chats);
                            UI.renderList();
                            if(State.activeChat === data.from) UI.renderMessages();
                        }
                        // File metadata
                        if(data.type === 'FILE_META') {
                            incomingFilename = data.filename;
                        }
                        // File payload (Blob)
                        if(data.type === 'FILE_DATA') {
                            data.filename = incomingFilename; // attach metadata to blob packet
                            InfinityStream.receiveFile(data);
                        }
                    });
                });

                State.peer.on('call', call => CallManager.handleIncoming(call));
            },

            addContact() {
                const id = document.getElementById('add-id').value.toUpperCase();
                if(!id || id === State.myID) return;
                if(!State.chats[id]) State.chats[id] = {messages:[]};
                DB.set('aura18_chats', State.chats);
                UI.renderList(); this.openChat(id);
                document.getElementById('add-id').value = '';
            },

            openChat(id) {
                State.activeChat = id;
                document.getElementById('empty-state').classList.add('hidden');
                document.getElementById('active-chat-view').classList.remove('hidden');
                document.getElementById('active-name').innerText = id;
                document.getElementById('active-av').innerText = id[0];
                UI.renderList(); UI.renderMessages();
                if(window.innerWidth <= 768) UI.toggleSidebar(false);
            },

            sendMessage() {
                const val = document.getElementById('msg-input').value.trim();
                if(!val || !State.activeChat) return;
                const conn = State.peer.connect('AURA-' + State.activeChat);
                conn.on('open', () => {
                    conn.send({ type: 'MSG', text: val, from: State.myID });
                    State.chats[State.activeChat].messages.push({t: val, s: 'out'});
                    DB.set('aura18_chats', State.chats);
                    UI.renderMessages(); UI.renderList();
                    document.getElementById('msg-input').value = "";
                });
            },

            hardReset() {
                DB.clear(); location.reload();
            }
        };

        window.onload = () => AppLogic.init();
    </script>
</body>
</html>
