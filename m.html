<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aura Pulse v19 | Video & Privacy</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-base: #0e1621; --bg-panel: #17212b; --bg-hover: #202b36; --bg-active: #2b5278;
            --primary: #2b5278; --accent: #00f2ff; --text-main: #ffffff; --text-muted: #7f91a4;
            --text-danger: #ff595a; --text-success: #4cd964; --radius-md: 12px; --radius-lg: 18px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); height: 100dvh; overflow: hidden; }
        .hidden { display: none !important; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-md); cursor: pointer; font-weight: 600; }
        .input { width: 100%; background: var(--bg-panel); border: 1px solid #2f3942; color: white; padding: 12px; border-radius: var(--radius-md); margin-bottom: 10px; }
        
        /* Layout */
        .app-container { display: flex; height: 100%; }
        .sidebar { width: 320px; background: var(--bg-panel); border-right: 1px solid #000; display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Request Section */
        .request-banner { background: #2c3e50; padding: 10px; text-align: center; font-size: 13px; border-bottom: 1px solid var(--accent); }

        /* Video Call UI */
        #video-grid { position: fixed; inset: 0; background: black; z-index: 20000; display: flex; flex-direction: column; }
        .video-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .local-video { position: absolute; bottom: 100px; right: 20px; width: 120px; height: 160px; border-radius: 12px; border: 2px solid var(--accent); z-index: 10; }
        .call-tools { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; z-index: 20; }
        
        /* Tabs */
        .tabs { display: flex; background: var(--bg-base); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--text-muted); font-size: 14px; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent); }

        .msg { padding: 8px 15px; border-radius: 15px; margin: 5px; max-width: 80%; }
        .msg.in { background: #182533; align-self: flex-start; }
        .msg.out { background: var(--primary); align-self: flex-end; }
        .chat-list-item { padding: 15px; border-bottom: 1px solid #0e1621; cursor: pointer; display: flex; justify-content: space-between; }
        .chat-list-item:hover { background: var(--bg-hover); }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed-overlay" style="position:fixed; inset:0; background:var(--bg-base); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div style="max-width:320px; width:100%; text-align:center;">
            <h1 style="margin-bottom:20px;">AURA PULSE v19</h1>
            <input type="text" id="auth-id" class="input" placeholder="ID пользователя">
            <input type="password" id="auth-pw" class="input" placeholder="Пароль">
            <button class="btn w-full" style="width:100%" onclick="App.login()">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-info" style="font-size:12px; color:var(--text-muted); margin-top:15px;">Пароль сохраняется локально. Не забудьте его!</p>
        </div>
    </div>

    <div id="video-grid" class="hidden">
        <div class="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" class="local-video" autoplay playsinline muted></video>
        </div>
        <div class="call-tools">
            <button class="btn" style="background:var(--text-danger); border-radius:50%; width:60px; height:60px;" onclick="Calls.end()">📞</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <div class="tabs">
                <div class="tab active" id="tab-chats" onclick="App.switchTab('chats')">ЧАТЫ</div>
                <div id="tab-req-indicator" class="tab" onclick="App.switchTab('req')">ЗАПРОСЫ (0)</div>
            </div>
            
            <div id="list-container" style="flex:1; overflow-y:auto;">
                </div>

            <div style="padding:15px; background:var(--bg-base);">
                <input type="text" id="new-contact-id" class="input" placeholder="+ Добавить ID" style="margin:0;">
                <button class="btn" style="width:100%; margin-top:5px;" onclick="App.addContact()">Начать чат</button>
            </div>
        </div>

        <div class="chat-area">
            <div id="no-chat" style="margin:auto; color:var(--text-muted);">Выберите диалог</div>
            
            <div id="chat-view" class="hidden" style="display:flex; flex-direction:column; height:100%;">
                <div id="req-controls" class="request-banner hidden">
                    <span>Этот пользователь не в вашем списке контактов.</span><br>
                    <button class="btn" style="padding:5px 10px; font-size:12px; margin-top:5px;" onclick="App.acceptRequest()">ПРИНЯТЬ</button>
                    <button class="btn" style="padding:5px 10px; font-size:12px; margin-top:5px; background:var(--text-danger);" onclick="App.rejectRequest()">ОТКЛОНИТЬ</button>
                </div>
                
                <div style="padding:15px; background:var(--bg-panel); display:flex; justify-content:space-between; align-items:center;">
                    <b id="chat-title">Username</b>
                    <button id="call-btn" class="btn" style="background:var(--text-success);" onclick="Calls.start(true)">ВИДЕО</button>
                </div>

                <div id="msg-box" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column;"></div>

                <div style="padding:15px; background:var(--bg-panel); display:flex; gap:10px;">
                    <input type="text" id="msg-input" class="input" style="margin:0;" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') App.sendText()">
                    <button class="btn" onclick="App.sendText()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const App = {
            myID: '', myPW: '', peer: null,
            activeTab: 'chats', activeChat: null,
            db: JSON.parse(localStorage.getItem('aura_v19_db')) || { chats: {}, requests: {}, contacts: [] },

            save() { localStorage.setItem('aura_v19_db', JSON.stringify(this.db)); },

            login() {
                const id = document.getElementById('auth-id').value.toUpperCase().trim();
                const pw = document.getElementById('auth-pw').value.trim();
                if(!id || !pw) return alert("Введите ID и Пароль");
                
                this.myID = id; this.myPW = pw;
                document.getElementById('auth-screen').classList.add('hidden');
                this.initPeer();
            },

            initPeer() {
                // Мы используем пароль как часть ID для PeerJS (упрощенная имитация защиты)
                // В идеале пароль проверяется на сервере, но у нас P2P, поэтому пароль - это ключ шифрования/доступа
                this.peer = new Peer('AURA-' + this.myID);

                this.peer.on('open', () => this.render());

                this.peer.on('connection', conn => {
                    conn.on('data', data => {
                        if(data.type === 'MSG') this.handleIncomingMsg(data);
                    });
                });

                this.peer.on('call', call => {
                    if(!this.db.contacts.includes(call.peer.replace('AURA-',''))) {
                        return; // Не принимать звонки от тех, кто не в контактах
                    }
                    Calls.answer(call);
                });
            },

            handleIncomingMsg(data) {
                const from = data.from;
                // Если нет в контактах - в запросы
                if (!this.db.contacts.includes(from)) {
                    if (!this.db.requests[from]) this.db.requests[from] = { messages: [] };
                    this.db.requests[from].messages.push({ t: data.text, s: 'in' });
                } else {
                    if (!this.db.chats[from]) this.db.chats[from] = { messages: [] };
                    this.db.chats[from].messages.push({ t: data.text, s: 'in' });
                }
                this.save();
                this.render();
            },

            switchTab(tab) {
                this.activeTab = tab;
                this.render();
            },

            addContact() {
                const id = document.getElementById('new-contact-id').value.toUpperCase().trim();
                if(!id || id === this.myID) return;
                if(!this.db.contacts.includes(id)) {
                    this.db.contacts.push(id);
                    if(!this.db.chats[id]) this.db.chats[id] = { messages: [] };
                }
                this.save();
                this.openChat(id);
                document.getElementById('new-contact-id').value = '';
            },

            openChat(id) {
                this.activeChat = id;
                document.getElementById('no-chat').classList.add('hidden');
                document.getElementById('chat-view').classList.remove('hidden');
                document.getElementById('chat-title').innerText = id;
                
                const isRequest = this.activeTab === 'req';
                document.getElementById('req-controls').classList.toggle('hidden', !isRequest);
                document.getElementById('call-btn').classList.toggle('hidden', isRequest);

                this.renderMessages();
            },

            acceptRequest() {
                const id = this.activeChat;
                this.db.contacts.push(id);
                this.db.chats[id] = this.db.requests[id];
                delete this.db.requests[id];
                this.save();
                this.activeTab = 'chats';
                this.openChat(id);
                this.render();
            },

            rejectRequest() {
                delete this.db.requests[this.activeChat];
                this.save();
                this.activeChat = null;
                document.getElementById('chat-view').classList.add('hidden');
                document.getElementById('no-chat').classList.remove('hidden');
                this.render();
            },

            sendText() {
                const text = document.getElementById('msg-input').value;
                if(!text || !this.activeChat) return;

                const conn = this.peer.connect('AURA-' + this.activeChat);
                conn.on('open', () => {
                    conn.send({ type: 'MSG', text: text, from: this.myID });
                    this.db.chats[this.activeChat].messages.push({ t: text, s: 'out' });
                    this.save();
                    this.renderMessages();
                    document.getElementById('msg-input').value = '';
                });
            },

            render() {
                const container = document.getElementById('list-container');
                container.innerHTML = '';
                
                const source = this.activeTab === 'chats' ? this.db.chats : this.db.requests;
                const reqCount = Object.keys(this.db.requests).length;
                document.getElementById('tab-req-indicator').innerText = `ЗАПРОСЫ (${reqCount})`;
                document.getElementById('tab-chats').className = `tab ${this.activeTab==='chats'?'active':''}`;
                document.getElementById('tab-req-indicator').className = `tab ${this.activeTab==='req'?'active':''}`;

                Object.keys(source).forEach(id => {
                    const el = document.createElement('div');
                    el.className = 'chat-list-item';
                    el.innerHTML = `<span>${id}</span>`;
                    el.onclick = () => this.openChat(id);
                    container.appendChild(el);
                });
            },

            renderMessages() {
                const box = document.getElementById('msg-box');
                box.innerHTML = '';
                const source = this.activeTab === 'chats' ? this.db.chats : this.db.requests;
                if(!source[this.activeChat]) return;
                source[this.activeChat].messages.forEach(m => {
                    const d = document.createElement('div');
                    d.className = `msg ${m.s}`;
                    d.innerText = m.t;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            }
        };

        const Calls = {
            current: null, stream: null,
            async start(video = true) {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video });
                    document.getElementById('local-video').srcObject = this.stream;
                    document.getElementById('video-grid').classList.remove('hidden');
                    
                    this.current = App.peer.call('AURA-' + App.activeChat, this.stream);
                    this.current.on('stream', remoteStream => {
                        document.getElementById('remote-video').srcObject = remoteStream;
                    });
                } catch (e) { alert("Ошибка доступа к камере/микрофону"); }
            },
            async answer(call) {
                if(!confirm("Входящий видеозвонок от " + call.peer)) return call.close();
                this.stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('local-video').srcObject = this.stream;
                document.getElementById('video-grid').classList.remove('hidden');
                call.answer(this.stream);
                call.on('stream', remoteStream => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                });
                this.current = call;
            },
            end() {
                if(this.current) this.current.close();
                if(this.stream) this.stream.getTracks().forEach(t => t.stop());
                document.getElementById('video-grid').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
